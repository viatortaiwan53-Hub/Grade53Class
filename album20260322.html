<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>65級50週年同學會紀念相簿</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #c0392b; /* 喜慶的紅色 */
            --text-on-dark: #f8f9fa;
            --bg-body: #ecf0f1;
            --bg-card: #ffffff;
        }

        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--primary-color);
            line-height: 1.6;
        }

        /* 1. Hero Section - 採用第4張全景圖 */
        .hero {
            position: relative;
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('LINE_ALBUM_2026.03.22同學會65級50週年_260408_4.jpg') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--text-on-dark);
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* 內容容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-title {
            text-align: center;
            margin: 60px 0 40px;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            left: 50%;
            position: relative;
            transform: translateX(-50%);
            padding-bottom: 10px;
            font-size: 2rem;
        }

        /* 大網格 - 用於合照 */
        .photo-grid-large {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .photo-card {
            background: var(--bg-card);
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .photo-card:hover {
            transform: translateY(-5px);
        }

        .photo-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            display: block;
        }

        /* 小網格 - 用於發言特寫 */
        .photo-grid-small {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 50px;
        }

        /* 圓形特寫與自拍風格 */
        .photo-circular {
            text-align: center;
        }

        .photo-circular img {
            width: 100%;
            border-radius: 50%; /* 圓形 */
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* 餐桌花絮區 */
        .table-candids {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        footer {
            text-align: center;
            padding: 40px;
            background: var(--primary-color);
            color: #bdc3c7;
            margin-top: 70px;
        }

        /* 響應式調整 */
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2rem; }
            .photo-grid-large { grid-template-columns: 1fr; }
            .table-candids { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content">
            <h1>五十載同窗情 · 半世紀再聚首</h1>
            <p>畢業 65 級 50 週年紀念同學會</p>
        </div>
    </header>

    <div class="container">
        
        <h2 class="section-title">紀念這一刻</h2>
        <div class="photo-grid-small photo-circular">
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_21.jpg" alt="50週年蛋糕與牌匾">
                <p><strong>歲月留痕</strong><br>「50」字樣與紀念牌匾，見證半世紀情誼</p>
            </div>
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_5.jpg" alt="老友自拍">
                <p><strong>至真至誠</strong><br>不管多年，依然是那對無話不談的老朋友</p>
            </div>
        </div>

        <h2 class="section-title">重逢的喜悅</h2>
        <div class="photo-grid-large">
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_1.jpg" alt="合照1">
            </div>
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_2.jpg" alt="合照2">
            </div>
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_3.jpg" alt="合照3">
            </div>
        </div>

        <h2 class="section-title">那些年與這些年的故事</h2>
        <div class="photo-grid-small photo-circular">
            <div class="photo-item">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_6.jpg" alt="發言剪影1">
            </div>
            <div class="photo-item">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_22.jpg" alt="發言特寫1">
            </div>
            <div class="photo-item">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_23.jpg" alt="發言特寫2">
            </div>
            <div class="photo-item">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_25.jpg" alt="發言特寫3">
            </div>
            <div class="photo-item">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_26.jpg" alt="發言特寫4">
            </div>
            <div class="photo-item">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_10.jpg" alt="發言剪影2">
            </div>
        </div>

        <h2 class="section-title">杯觥交錯間的歡笑</h2>
        <div class="table-candids">
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_24.jpg" alt="餐桌花絮1">
            </div>
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_29.jpg" alt="餐桌花絮2">
            </div>
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_27.jpg" alt="餐飲花絮1">
            </div>
            <div class="photo-card">
                <img src="LINE_ALBUM_2026.03.22同學會65級50週年_260408_28.jpg" alt="餐飲花絮2">
            </div>
        </div>

    </div>

    <footer>
        <p>© 2026 畢業 65 級同學會委員會 | 珍惜當下 · 友誼長存</p>
    </footer>

</body>
</html>

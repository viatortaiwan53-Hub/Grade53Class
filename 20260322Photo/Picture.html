<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>同學會 65級 50週年 相簿</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .photo-card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s ease-in-out;
        }
        .photo-card:hover {
            transform: scale(1.05);
        }
        .photo-card img {
            width: 100%;
            height: 200px; /* 固定高度，可依需求調整 */
            object-fit: cover; /* 確保圖片不變形填滿區域 */
            display: block;
        }
        .photo-label {
            padding: 8px;
            text-align: center;
            font-size: 14px;
            color: #555;
            word-wrap: break-word; /* 避免文字太長跑出去 */
        }
    </style>
</head>
<body>

    <h1>同學會 65級 50週年 紀念相簿</h1>

    <div id="gallery">
        </div>

    <script>
        // 設定圖片的基本資訊
        const baseFileName = 'LINE_ALBUM_2026.03.22同學會65級50週年_260408_';
        const fileExtension = '.jpg';
        const totalPhotos = 80;

        // 取得要插入圖片的 container
        const gallery = document.getElementById('gallery');

        // 使用迴圈生成每張圖片的 HTML
        for (let i = 1; i <= totalPhotos; i++) {
            // 構建完整的檔案名稱
            const fileName = `${baseFileName}${i}${fileExtension}`;

            // 建立圖片卡片的 div
            const photoCard = document.createElement('div');
            photoCard.className = 'photo-card';

            // 建立圖片超連結 (點擊可放大看原圖)
            const photoLink = document.createElement('a');
            photoLink.href = fileName; // 連結指向原圖檔案
            photoLink.target = '_blank'; // 在新分頁打開

            // 建立圖片元素
            const img = document.createElement('img');
            img.src = fileName; // 圖片來源為生成的檔名
            img.alt = `同學會照片 ${i}`; // 替代文字
            // 加入 lazy loading 提高網頁載入效率
            img.loading = 'lazy'; 

            // 建立文字標籤
            const label = document.createElement('div');
            label.className = 'photo-label';
            label.textContent = `照片 #${i}`;

            // 將元素組合起來
            photoLink.appendChild(img);
            photoCard.appendChild(photoLink);
            photoCard.appendChild(label);
            
            // 將卡片加入相簿
            gallery.appendChild(photoCard);
        }
    </script>

</body>
</html>
